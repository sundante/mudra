name: mudra
description: "Your money. Clear, every morning."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.1.1

  # Local database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Navigation
  go_router: ^14.2.2

  # Fonts
  google_fonts: ^6.2.1

  # Number formatting
  intl: ^0.19.0

  # Animations
  flutter_animate: ^4.5.0

  # Utils
  uuid: ^4.4.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1
  riverpod_generator: 2.4.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
