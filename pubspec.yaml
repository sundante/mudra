name: mudra
description: "Your money. Clear, every morning."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.1.1

  # Local database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Navigation
  go_router: ^14.2.2

  # Authentication
  supabase_flutter: ^2.9.1
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^8.0.0
  crypto: ^3.0.6

  # Fonts
  google_fonts: ^6.2.1

  # Number formatting
  intl: ^0.19.0

  # Animations
  flutter_animate: ^4.5.0

  # Utils
  uuid: ^4.4.0
  collection: ^1.18.0

  # Charts
  fl_chart: ^0.69.0

  # Splash screen
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1
  riverpod_generator: 2.4.0
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#FFFFFF"
  android_12:
    color: "#FFFFFF"
  fullscreen: true
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/maps/

  fonts:
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond/CormorantGaramond-Regular.ttf
          weight: 400
        - asset: assets/fonts/CormorantGaramond/CormorantGaramond-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/CormorantGaramond/CormorantGaramond-Medium.ttf
          weight: 500
        - asset: assets/fonts/CormorantGaramond/CormorantGaramond-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/CormorantGaramond/CormorantGaramond-Bold.ttf
          weight: 700

    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSans/IBMPlexSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/IBMPlexSans/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans/IBMPlexSans-SemiBold.ttf
          weight: 600

    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono/IBMPlexMono-SemiBold.ttf
          weight: 600
